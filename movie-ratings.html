<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Ratings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #f0ece4;
      --muted: #888;
      --accent: #e8b94f;
      --accent-dim: rgba(232,185,79,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeUp 0.5s ease both;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.1;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 0.5rem;
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus { border-color: var(--accent); }

    .stars-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star {
      font-size: 26px;
      cursor: pointer;
      color: #333;
      transition: color 0.1s, transform 0.1s;
      line-height: 1;
      user-select: none;
    }

    .star.lit { color: var(--accent); }
    .star:hover { transform: scale(1.2); }

    .score-text {
      margin-left: 10px;
      font-size: 13px;
      color: var(--muted);
      min-width: 90px;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 0.5rem;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #0d0d0d;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.98); }

    .ratings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .ratings-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
    }

    .count-badge {
      font-size: 12px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    #ratings-list { }

    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--muted);
      font-size: 14px;
      animation: fadeUp 0.4s ease both;
    }

    .empty .icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }

    .rating-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.35s ease both;
      transition: border-color 0.2s;
    }

    .rating-item:hover { border-color: var(--border-hover); }

    .info { flex: 1; min-width: 0; }

    .info .title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .info .stars-row {
      margin-top: 5px;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .score {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border-hover);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Movie<br><span>Ratings</span></h1>
      <p>Share your take on a film.</p>
    </header>

    <div class="form-card">
      <div class="field">
        <label for="movie-input">Movie title</label>
        <input type="text" id="movie-input" placeholder="e.g. Interstellar" />
      </div>
      <div class="field">
        <label>Your rating</label>
        <div class="stars-wrap" id="star-row">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
          <span class="star" data-v="6">★</span>
          <span class="star" data-v="7">★</span>
          <span class="star" data-v="8">★</span>
          <span class="star" data-v="9">★</span>
          <span class="star" data-v="10">★</span>
          <span class="score-text" id="score-text">— / 10</span>
        </div>
      </div>
      <div class="field" style="margin-bottom:0.5rem;">
        <label for="name-input">Your name</label>
        <input type="text" id="name-input" placeholder="e.g. Alex" />
      </div>
      <button class="submit-btn" id="submit-btn">Submit rating</button>
    </div>

    <div class="ratings-header">
      <h2>All ratings</h2>
      <span class="count-badge" id="count-badge">0 reviews</span>
    </div>
    <div id="ratings-list">
      <div class="empty">
        <div class="icon">🎬</div>
        No ratings yet — be the first!
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const LABELS = ['','Unwatchable','Terrible','Bad','Poor','Average','Decent','Good','Great','Excellent','Masterpiece'];
    let selected = 0;
    const ratings = [];

    const stars = document.querySelectorAll('.star');
    const scoreText = document.getElementById('score-text');
    const list = document.getElementById('ratings-list');
    const badge = document.getElementById('count-badge');
    const toast = document.getElementById('toast');

    stars.forEach(s => {
      s.addEventListener('mouseover', () => highlight(+s.dataset.v));
      s.addEventListener('mouseleave', () => highlight(selected));
      s.addEventListener('click', () => { selected = +s.dataset.v; highlight(selected); });
    });

    function highlight(n) {
      stars.forEach(s => s.classList.toggle('lit', +s.dataset.v <= n));
      scoreText.textContent = n ? `${n} / 10 · ${LABELS[n]}` : '— / 10';
    }

    document.getElementById('submit-btn').addEventListener('click', () => {
      const movie = document.getElementById('movie-input').value.trim();
      const name  = document.getElementById('name-input').value.trim();
      if (!movie)    { showToast('Please enter a movie title.'); return; }
      if (!selected) { showToast('Please choose a rating.'); return; }
      if (!name)     { showToast('Please enter your name.'); return; }

      ratings.unshift({ movie, score: selected, name });
      render();
      document.getElementById('movie-input').value = '';
      document.getElementById('name-input').value  = '';
      selected = 0;
      highlight(0);
      showToast('Rating added!');
    });

    function render() {
      badge.textContent = ratings.length === 1 ? '1 review' : `${ratings.length} reviews`;
      if (!ratings.length) {
        list.innerHTML = '<div class="empty"><div class="icon">🎬</div>No ratings yet — be the first!</div>';
        return;
      }
      list.innerHTML = ratings.map((r, i) => {
        const filled = '★'.repeat(Math.round(r.score / 2));
        const empty  = '☆'.repeat(5 - Math.round(r.score / 2));
        return `<div class="rating-item" style="animation-delay:${i * 0.04}s">
          <div class="info">
            <div class="title">${esc(r.movie)}</div>
            <div class="meta">reviewed by ${esc(r.name)}</div>
            <div class="stars-row">${filled}<span style="opacity:0.2">${empty}</span></div>
          </div>
          <div class="score">${r.score}/10</div>
        </div>`;
      }).join('');
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    let tid;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(tid);
      tid = setTimeout(() => toast.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
